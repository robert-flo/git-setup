name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install --yes shellcheck
      - name: Lint shell scripts
        run: shellcheck bin/git-setup lib/global_fn.sh tests/*.sh
      - name: Run tests
        run: for test_file in tests/*.sh; do bash "$test_file"; done
